<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#73b9f7,#73b9f7);
        }

        .success-box{
            width:420px;
            background:#fff;
            padding:40px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }

        .success-icon{
            width:80px;
            height:80px;
            line-height:80px;
            margin:0 auto 20px;
            background:#28a745;
            color:white;
            font-size:40px;
            border-radius:50%;
        }

        h1{
            color:#28a745;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:25px;
            font-size:16px;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            background:#007bff;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            font-size:16px;
            transition:.3s;
        }

        .btn:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="success-box">

    <div class="success-icon">✓</div>

    <h1>Registration Successful🎉.</h1>

    <p>Your account has been created successfully.</p>

    <a href="{% url 'login' %}" class="btn">
        Go to Login
    </a>

</div>

</body>
</html>
