<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>

    <style>
       @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(40px);
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,.12);
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(40px);
}

.success-box{
    position:relative;
    z-index:1;
    width:100%;
    max-width:420px;
    padding:40px 35px;
    text-align:center;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.3);
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    animation:fadeIn .6s ease;
}

.success-icon{
    width:90px;
    height:90px;
    margin:0 auto 25px;
    border-radius:50%;
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    box-shadow:0 10px 25px rgba(34,197,94,.4);
}

h1{
    color:#fff;
    font-size:32px;
    font-weight:600;
    margin-bottom:15px;
}

p{
    color:#f3f4f6;
    font-size:16px;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    text-decoration:none;
    background:linear-gradient(90deg,#4f8cff,#2563eb);
    color:#fff;
    padding:14px 30px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(37,99,235,.4);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:480px){

    .success-box{
        padding:30px 25px;
    }

    h1{
        font-size:26px;
    }

    .success-icon{
        width:75px;
        height:75px;
        font-size:36px;
    }

    .btn{
        width:100%;
    }
}
    </style>
</head>

<body>

<div class="success-box">

    <div class="success-icon">✓</div>

    <h1>Registration Successful🎉.</h1>

    <p>Your account has been created successfully.</p>

    <a href="{% url 'login' %}" class="btn">
        Go to Login
    </a>

</div>

</body>
</html>
