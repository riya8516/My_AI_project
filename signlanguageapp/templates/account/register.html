<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>
<style>
/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    overflow:hidden;
}

/* Background Glow */
body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    top:-120px;
    left:-120px;
    filter:blur(40px);
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,.12);
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(40px);
}

.box{
    position:relative;
    z-index:1;
    width:100%;
    max-width:430px;
    padding:40px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.3);
    border-radius:20px;
    box-shadow:0 20px 45px rgba(0,0,0,.25);
    animation:fadeIn .7s ease;
}

h2{
    text-align:center;
    color:#fff;
    font-size:30px;
    margin-bottom:30px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px 18px;
    margin:12px 0;
    border:2px solid transparent;
    border-radius:12px;
    background:rgba(255,255,255,.9);
    font-size:15px;
    transition:.3s;
}

input::placeholder{
    color:#777;
}

input:focus{
    border-color:#4f8cff;
    box-shadow:0 0 15px rgba(79,140,255,.4);
    outline:none;
    transform:translateY(-2px);
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#4f8cff,#2563eb);
    color:#fff;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.35s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 12px 25px rgba(37,99,235,.4);
}

button:active{
    transform:scale(.98);
}

.msg,
.success{
    background:#d1fae5;
    color:#065f46;
    padding:14px;
    border-left:5px solid #10b981;
    border-radius:10px;
    margin-bottom:18px;
    text-align:center;
}

.err,
.error{
    background:#fee2e2;
    color:#991b1b;
    padding:14px;
    border-left:5px solid #ef4444;
    border-radius:10px;
    margin-bottom:18px;
    text-align:center;
}

p{
    margin-top:20px;
    text-align:center;
    color:#fff;
}

a{
    color:#fff;
    font-weight:600;
    text-decoration:none;
    transition:.3s;
}

a:hover{
    color:#ffd166;
    text-decoration:underline;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:480px){

    .box{
        padding:30px 25px;
    }

    h2{
        font-size:25px;
    }

    input,
    button{
        padding:13px;
    }
}
</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

{% for message in messages %}
<div class="{{message.tags}}">
{{message}}
</div>
{% endfor %}

<form method="POST">

{% csrf_token %}

<input type="text" name="fname" placeholder="First Name" required>

<input type="text" name="lname" placeholder="Last Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="city" placeholder="City" required>

<input type="text" name="state" placeholder="State" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="cpassword" placeholder="Confirm Password" required>

<button type="submit">Register</button>

</form>
<center>
<p>
Already have an account?
<a href="{% url 'login' %}">Login</a>
</p>
</center>
</div>

</body>
</html>
