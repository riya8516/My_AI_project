<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;

}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9966,#ff5e62);

}

.box{

width:380px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px gray;

}

h2{

text-align:center;
color:#ff5e62;
margin-bottom:20px;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;

}

button{

width:100%;
padding:12px;
background:#ff5e62;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;

}

button:hover{

background:#ff2e4d;

}

.success{

text-align:center;
color:green;
margin-bottom:15px;

}

.error{

text-align:center;
color:red;
margin-bottom:15px;

}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

{% for message in messages %}

<div class="{{message.tags}}">

{{message}}

</div>

{% endfor %}

<form method="POST">

{% csrf_token %}

<input type="email" name="email" placeholder="Email">

<input type="password" name="password" placeholder="Password">

<button>Login</button>

</form>

<br>

<center>

New User?

<a href="{% url 'register' %}">Register</a>

</center>

</div>

</body>
</html>
