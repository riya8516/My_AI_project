<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#00c6ff,#62a6fa);

}

.box{

width:420px;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 20px gray;

}

h2{

text-align:center;
margin-bottom:20px;
color:#0072ff;

}

input{

width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;

}

button{

width:100%;
padding:12px;
background:#0072ff;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;

}

button:hover{

background:#0052cc;

}

.msg{

text-align:center;
color:green;
margin-bottom:15px;

}

.err{

text-align:center;
color:red;
margin-bottom:15px;

}

a{

text-decoration:none;

}

</style>

</head>

<body>

<div class="box">

<h2>Register</h2>

{% for message in messages %}

<div class="{{message.tags}}">

{{message}}

</div>

{% endfor %}

<form method="POST">

{% csrf_token %}

<input type="text" name="fname" placeholder="First Name" required>

<input type="text" name="lname" placeholder="Last Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="city" placeholder="City" required>

<input type="text" name="state" placeholder="State" required>

<input type="password" name="password" placeholder="Password" required>

<input type="password" name="cpassword" placeholder="Confirm Password" required>

<button type="submit">Register</button>

</form>

<br>

<center>

Already Registered?

<a href="{% url 'login' %}">Login</a>

</center>

</div>

</body>
</html>
